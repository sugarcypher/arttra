<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>arttra.art — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#08080e;--panel:#0e0e18;--panel2:#13132a;--surface:#1a1a2e;
      --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
      --text:#e8e8f0;--muted:#8888a8;
      --accent:#ff4fd8;--accent2:#45d7ff;--good:#39d98a;--danger:#ff5964;--warn:#ffc145;
      --mono:'JetBrains Mono',monospace;--sans:'DM Sans',system-ui,sans-serif;
    }
    *{box-sizing:border-box;margin:0}
    html,body{height:100%}
    body{font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.5;user-select:none}

    .topbar{position:sticky;top:0;z-index:50;background:rgba(8,8,14,.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
    .topbar__title{font-weight:900;font-size:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .topbar__actions{display:flex;gap:6px;align-items:center}
    .topbar__stat{font-family:var(--mono);font-size:11px;color:var(--muted);margin-right:8px}

    .btn{padding:6px 14px;border-radius:7px;border:1px solid var(--border2);background:var(--surface);color:var(--text);cursor:pointer;font-family:var(--sans);font-size:12px;font-weight:600;transition:all .12s}
    .btn:hover{border-color:var(--accent);background:rgba(255,79,216,.08)}
    .btn--accent{background:var(--accent);border-color:var(--accent);color:#fff}
    .btn--good{background:rgba(57,217,138,.15);border-color:var(--good);color:var(--good)}
    .btn--danger{background:rgba(255,89,100,.1);border-color:var(--danger);color:var(--danger)}
    .btn--warn{background:rgba(255,193,69,.1);border-color:var(--warn);color:var(--warn)}
    .btn--sm{padding:4px 10px;font-size:11px}

    .toolbar{padding:8px 16px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--panel)}
    .toolbar__search{flex:1;min-width:160px;padding:6px 12px;border-radius:7px;border:1px solid var(--border2);background:var(--surface);color:var(--text);font-size:13px;font-family:var(--sans)}
    .toolbar__search:focus{outline:none;border-color:var(--accent)}
    .tf{padding:5px 10px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;cursor:pointer;font-family:var(--sans);font-weight:600}
    .tf:hover{color:var(--text);border-color:var(--border2)}
    .tf--active{color:var(--accent);border-color:var(--accent);background:rgba(255,79,216,.06)}

    .batchbar{display:none;padding:8px 16px;gap:6px;align-items:center;background:var(--panel2);border-bottom:1px solid var(--border)}
    .batchbar.active{display:flex;flex-wrap:wrap}
    .batchbar__count{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--accent);margin-right:6px}
    .batchbar select,.batchbar input{padding:5px 8px;border-radius:6px;border:1px solid var(--border2);background:var(--surface);color:var(--text);font-size:12px;font-family:var(--sans)}

    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:2px;padding:2px}

    .card{background:var(--panel);border:2px solid transparent;cursor:pointer;position:relative;transition:border-color .1s}
    .card:hover{border-color:var(--border2)}
    .card.selected{border-color:var(--accent);background:rgba(255,79,216,.04)}
    .card__img{width:100%;aspect-ratio:1;object-fit:cover;display:block}
    .card__body{padding:8px}
    .card__title{font-weight:700;font-size:12px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .card__meta{display:flex;justify-content:space-between;align-items:center;margin-top:3px;font-size:10px;color:var(--muted)}
    .card__badge{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:2px 5px;border-radius:3px}
    .badge--metal{background:rgba(255,79,216,.12);color:var(--accent)}
    .badge--photo{background:rgba(69,215,255,.12);color:var(--accent2)}
    .badge--print{background:rgba(57,217,138,.12);color:var(--good)}
    .badge--original{background:rgba(255,193,69,.12);color:var(--warn)}
    .badge--textile{background:rgba(200,64,255,.12);color:#c840ff}
    .badge--sold{position:absolute;top:6px;right:6px;background:var(--danger);color:#fff;font-size:9px;font-weight:800;padding:2px 6px;border-radius:3px;text-transform:uppercase}
    .card__edited{position:absolute;top:6px;left:6px;width:7px;height:7px;border-radius:50%;background:var(--accent)}

    .ep{position:fixed;top:0;right:0;bottom:0;width:min(460px,90vw);background:var(--panel);border-left:1px solid var(--border);z-index:100;transform:translateX(100%);transition:transform .2s ease;display:flex;flex-direction:column;overflow:hidden}
    .ep.open{transform:translateX(0)}
    .ep__bk{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;display:none}
    .ep__bk.open{display:block}
    .ep__hd{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
    .ep__title{font-weight:900;font-size:14px}
    .ep__x{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:2px 6px}
    .ep__x:hover{color:var(--text)}
    .ep__body{flex:1;overflow-y:auto;padding:16px}
    .ep__img{width:100%;max-height:240px;object-fit:contain;border-radius:8px;margin-bottom:12px;background:#000}
    .f{margin-bottom:12px}
    .f__l{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:3px}
    .f__i,.f__s,.f__t{width:100%;padding:7px 10px;border-radius:7px;border:1px solid var(--border2);background:var(--surface);color:var(--text);font-size:13px;font-family:var(--sans)}
    .f__i:focus,.f__s:focus,.f__t:focus{outline:none;border-color:var(--accent)}
    .f__t{min-height:50px;resize:vertical}
    .f__sku{font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:6px}
    .ep__ft{padding:10px 16px;border-top:1px solid var(--border);display:flex;gap:6px;justify-content:space-between}

    .toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--good);color:#000;padding:8px 18px;border-radius:7px;font-weight:700;font-size:13px;z-index:200;opacity:0;transition:opacity .3s}
    .toast.show{opacity:1}
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar__title">arttra admin</div>
  <div class="topbar__actions">
    <span class="topbar__stat" id="statTotal">—</span>
    <button class="btn btn--good" id="btnExport">Export overrides</button>
    <button class="btn" id="btnImport">Import</button>
    <input type="file" id="importFile" accept=".json" style="display:none">
  </div>
</div>

<div class="toolbar">
  <input class="toolbar__search" id="search" type="search" placeholder="Search..." />
  <button class="tf tf--active" data-f="all">All</button>
  <button class="tf" data-f="Original">Originals</button>
  <button class="tf" data-f="Metal Art">Metal</button>
  <button class="tf" data-f="Art Prints">Prints</button>
  <button class="tf" data-f="Photography">Photo</button>
  <button class="tf" data-f="Textile">Textile</button>
  <button class="tf" data-f="unpriced">Unpriced</button>
  <button class="tf" data-f="edited">Edited</button>
  <button class="btn btn--sm" id="selectAll">Select All Visible</button>
</div>

<div class="batchbar" id="batchbar">
  <span class="batchbar__count" id="batchCount">0</span>
  <select id="bCat"><option value="">Category...</option><option>Original</option><option>Metal Art</option><option>Art Prints</option><option>Photography</option><option>Textile</option></select>
  <select id="bStyle"><option value="">Style...</option><option>Ironwork</option><option>Chromata</option><option>Starkform</option><option>Naturalis</option><option>Luminos</option><option>Tenebrae</option><option>Intricata</option><option>Photography</option></select>
  <input id="bPrice" type="number" placeholder="$" style="width:70px" />
  <input id="bMat" type="text" placeholder="Materials" style="width:120px" />
  <button class="btn btn--accent btn--sm" id="bApply">Apply</button>
  <button class="btn btn--sm" id="bClear">Clear</button>
  <button class="btn btn--warn btn--sm" id="bSold">Mark Sold</button>
  <button class="btn btn--danger btn--sm" id="bBgRm">Flag bg removal</button>
  <button class="btn btn--danger btn--sm" id="bHide">Hide</button>
</div>

<div id="grid" class="grid"></div>

<div class="ep__bk" id="bk"></div>
<div class="ep" id="ep">
  <div class="ep__hd">
    <div class="ep__title">Edit</div>
    <button class="ep__x" id="epX">×</button>
  </div>
  <div class="ep__body">
    <img class="ep__img" id="eImg" />
    <div class="f__sku" id="eSku"></div>
    <div class="f"><div class="f__l">Title</div><input class="f__i" id="eName" /></div>
    <div class="f"><div class="f__l">Category</div>
      <select class="f__s" id="eCat"><option>Original</option><option>Metal Art</option><option>Art Prints</option><option>Photography</option><option>Textile</option></select>
    </div>
    <div class="f"><div class="f__l">Style</div>
      <select class="f__s" id="eStyle"><option>Ironwork</option><option>Chromata</option><option>Starkform</option><option>Naturalis</option><option>Luminos</option><option>Tenebrae</option><option>Intricata</option><option>Photography</option></select>
    </div>
    <div class="f"><div class="f__l">Price ($)</div><input class="f__i" id="ePrice" type="number" step="1" /></div>
    <div class="f"><div class="f__l">Materials</div><input class="f__i" id="eMat" placeholder="acrylic, ink, canvas, steel" /></div>
    <div class="f"><div class="f__l">Available products</div><input class="f__i" id="eProds" placeholder="Laser-Cut Metal, Canvas, Framed Print" /></div>
    <div class="f"><div class="f__l">Description</div><textarea class="f__t" id="eDesc"></textarea></div>
    <div class="f"><label style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" id="eSold" /><span class="f__l" style="margin:0">Sold (one-of-a-kind)</span></label></div>
    <div class="f"><label style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" id="eBgRm" /><span class="f__l" style="margin:0">Flag for bg removal</span></label></div>
    <div class="f"><label style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" id="eHide" /><span class="f__l" style="margin:0">Hidden</span></label></div>
    <div class="f"><button class="btn btn--danger btn--sm" id="eReset">Reset to auto</button></div>
  </div>
  <div class="ep__ft">
    <div><button class="btn btn--sm" id="ePrev">← Prev</button> <button class="btn btn--sm" id="eNext">Next →</button></div>
    <button class="btn btn--accent" id="eSave">Save</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let A=[],O={},sel=new Set(),filt="all",q="",eId=null,lastClicked=null;

async function load(){
  try{A=await(await fetch("./data/artworks.json",{cache:"no-store"})).json()}catch{A=[]}
  try{const s=localStorage.getItem("arttra_overrides");if(s)O=JSON.parse(s)}catch{}
  stats();render();
}
function save(){localStorage.setItem("arttra_overrides",JSON.stringify(O))}
function eff(a){return{...a,...(O[a.id]||{})}}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

function stats(){
  const oc=Object.keys(O).length;
  document.getElementById("statTotal").textContent=`${A.length} pieces`+(oc?` · ${oc} edits`:"");
}

function filtered(){
  return A.filter(a=>{
    const e=eff(a);
    if(filt==="edited")return!!O[a.id];
    if(filt==="unpriced")return(e.priceTiers?.startingPrice??79)===79;
    if(filt!=="all"&&e.category!==filt)return false;
    if(q){const h=[e.title,e.sku,e.style,e.category,e.materials||""].join(" ").toLowerCase();if(!h.includes(q.toLowerCase()))return false}
    return true;
  });
}

function render(){
  const g=document.getElementById("grid"),f=filtered();
  if(!f.length){g.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--muted)">No artworks</div>';return}
  g.innerHTML=f.map(a=>{
    const e=eff(a),s=sel.has(a.id),ed=!!O[a.id];
    const bc=e.category==="Metal Art"?"badge--metal":e.category==="Photography"?"badge--photo":e.category==="Original"?"badge--original":e.category==="Textile"?"badge--textile":"badge--print";
    return`<div class="card ${s?"selected":""}" data-id="${a.id}">
      ${ed?'<div class="card__edited"></div>':""}
      ${e.sold?'<div class="badge--sold">Sold</div>':""}
      <img class="card__img" src="${e.thumb||e.image||""}" loading="lazy" alt="" />
      <div class="card__body">
        <div class="card__title" title="${esc(e.title)}">${esc(e.title)}</div>
        <div class="card__meta">
          <span class="card__badge ${bc}">${esc(e.category||"?")}</span>
          <span>${e.priceTiers?.startingPrice?"$"+e.priceTiers.startingPrice:""}</span>
        </div>
      </div>
    </div>`;
  }).join("");

  g.querySelectorAll(".card").forEach(c=>{
    const id=c.dataset.id;
    c.addEventListener("click",e=>{
      if(e.shiftKey&&lastClicked){
        // Range select
        const f2=filtered(),i1=f2.findIndex(a=>a.id===lastClicked),i2=f2.findIndex(a=>a.id===id);
        if(i1>=0&&i2>=0){
          const lo=Math.min(i1,i2),hi=Math.max(i1,i2);
          for(let i=lo;i<=hi;i++)sel.add(f2[i].id);
        }
        batch();render();return;
      }
      if(e.metaKey||e.ctrlKey){
        // Toggle select
        sel.has(id)?sel.delete(id):sel.add(id);
        lastClicked=id;
        batch();render();return;
      }
      // Single click = open edit
      openEdit(id);
    });
  });
}

function batch(){
  const b=document.getElementById("batchbar");
  b.classList.toggle("active",sel.size>0);
  document.getElementById("batchCount").textContent=sel.size+" selected";
}

// Select All Visible
document.getElementById("selectAll").addEventListener("click",()=>{
  filtered().forEach(a=>sel.add(a.id));
  lastClicked=null;
  batch();render();
  toast(`Selected ${sel.size}`);
});

// Batch operations
document.getElementById("bApply").addEventListener("click",()=>{
  const cat=document.getElementById("bCat").value,sty=document.getElementById("bStyle").value;
  const pr=document.getElementById("bPrice").value,mat=document.getElementById("bMat").value;
  let c=0;
  for(const id of sel){
    if(!O[id])O[id]={};
    if(cat)O[id].category=cat;
    if(sty)O[id].style=sty;
    if(pr)O[id].priceTiers={startingPrice:Number(pr)};
    if(mat)O[id].materials=mat;
    c++;
  }
  save();stats();render();toast(`Updated ${c}`);
  document.getElementById("bCat").value="";document.getElementById("bStyle").value="";
  document.getElementById("bPrice").value="";document.getElementById("bMat").value="";
});
document.getElementById("bClear").addEventListener("click",()=>{sel.clear();lastClicked=null;batch();render()});
document.getElementById("bSold").addEventListener("click",()=>{
  for(const id of sel){if(!O[id])O[id]={};O[id].sold=true}
  save();stats();render();toast(`Marked ${sel.size} sold`);
});
document.getElementById("bBgRm").addEventListener("click",()=>{
  for(const id of sel){if(!O[id])O[id]={};O[id].removeBg=true}
  save();toast(`Flagged ${sel.size} for bg removal`);
});
document.getElementById("bHide").addEventListener("click",()=>{
  for(const id of sel){if(!O[id])O[id]={};O[id].hidden=true}
  save();stats();render();toast(`Hidden ${sel.size}`);
});

// Edit panel
function openEdit(id){
  eId=id;lastClicked=id;
  const a=A.find(x=>x.id===id);if(!a)return;
  const e=eff(a);
  document.getElementById("eImg").src=e.image||e.thumb||"";
  document.getElementById("eSku").textContent=e.sku||"";
  document.getElementById("eName").value=e.title||"";
  document.getElementById("eCat").value=e.category||"Art Prints";
  document.getElementById("eStyle").value=e.style||"Naturalis";
  document.getElementById("ePrice").value=e.priceTiers?.startingPrice||"";
  document.getElementById("eMat").value=e.materials||"";
  document.getElementById("eProds").value=(e.bestProducts||[]).join(", ");
  document.getElementById("eDesc").value=e.description||"";
  document.getElementById("eSold").checked=e.sold||false;
  document.getElementById("eBgRm").checked=e.removeBg||false;
  document.getElementById("eHide").checked=e.hidden||false;
  document.getElementById("ep").classList.add("open");
  document.getElementById("bk").classList.add("open");
}
function closeEdit(){
  document.getElementById("ep").classList.remove("open");
  document.getElementById("bk").classList.remove("open");
  eId=null;
}
document.getElementById("epX").addEventListener("click",closeEdit);
document.getElementById("bk").addEventListener("click",closeEdit);

document.getElementById("eSave").addEventListener("click",()=>{
  if(!eId)return;
  if(!O[eId])O[eId]={};
  const o=O[eId];
  o.title=document.getElementById("eName").value;
  o.category=document.getElementById("eCat").value;
  o.style=document.getElementById("eStyle").value;
  o.description=document.getElementById("eDesc").value;
  o.materials=document.getElementById("eMat").value;
  o.sold=document.getElementById("eSold").checked;
  o.removeBg=document.getElementById("eBgRm").checked;
  o.hidden=document.getElementById("eHide").checked;
  const p=document.getElementById("ePrice").value;
  if(p)o.priceTiers={startingPrice:Number(p)};
  const pr=document.getElementById("eProds").value;
  if(pr)o.bestProducts=pr.split(",").map(s=>s.trim()).filter(Boolean);
  save();stats();render();closeEdit();toast("Saved");
});
document.getElementById("eReset").addEventListener("click",()=>{
  if(!eId)return;delete O[eId];save();stats();openEdit(eId);toast("Reset");
});

// Prev/Next
document.getElementById("ePrev").addEventListener("click",()=>{
  if(!eId)return;const f=filtered(),i=f.findIndex(a=>a.id===eId);
  if(i>0){document.getElementById("eSave").click();openEdit(f[i-1].id)}
});
document.getElementById("eNext").addEventListener("click",()=>{
  if(!eId)return;const f=filtered(),i=f.findIndex(a=>a.id===eId);
  if(i<f.length-1){document.getElementById("eSave").click();openEdit(f[i+1].id)}
});

// Filters
document.querySelectorAll(".tf").forEach(b=>{
  b.addEventListener("click",()=>{
    document.querySelectorAll(".tf").forEach(x=>x.classList.remove("tf--active"));
    b.classList.add("tf--active");filt=b.dataset.f;render();
  });
});
document.getElementById("search").addEventListener("input",e=>{q=e.target.value;render()});

// Export/Import
document.getElementById("btnExport").addEventListener("click",()=>{
  const b=new Blob([JSON.stringify(O,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="overrides.json";a.click();
  toast("Exported — commit data/overrides.json to repo");
});
document.getElementById("btnImport").addEventListener("click",()=>document.getElementById("importFile").click());
document.getElementById("importFile").addEventListener("change",e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{try{O={...O,...JSON.parse(r.result)};save();stats();render();toast("Imported")}catch{toast("Bad JSON")}};
  r.readAsText(f);e.target.value="";
});

// Keyboard
window.addEventListener("keydown",e=>{
  if(e.key==="Escape")closeEdit();
  if((e.metaKey||e.ctrlKey)&&e.key==="a"&&!eId){e.preventDefault();filtered().forEach(a=>sel.add(a.id));batch();render()}
});

function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2000)}

load();
</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>arttra.art — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #08080e; --panel: #0e0e18; --panel2: #13132a; --surface: #1a1a2e;
      --border: rgba(255,255,255,.08); --border2: rgba(255,255,255,.14);
      --text: #e8e8f0; --muted: #8888a8;
      --accent: #ff4fd8; --accent2: #45d7ff; --good: #39d98a; --danger: #ff5964;
      --radius: 12px; --mono: 'JetBrains Mono', monospace; --sans: 'DM Sans', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; }
    html, body { height: 100%; }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); line-height: 1.5; }

    .topbar {
      position: sticky; top: 0; z-index: 50; background: rgba(8,8,14,.85);
      backdrop-filter: blur(12px); border-bottom: 1px solid var(--border);
      padding: 12px 20px; display: flex; align-items: center; justify-content: space-between;
    }
    .topbar__title {
      font-weight: 900; font-size: 18px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .topbar__actions { display: flex; gap: 8px; align-items: center; }
    .topbar__stat { font-family: var(--mono); font-size: 12px; color: var(--muted); margin-right: 12px; }

    .btn {
      padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border2);
      background: var(--surface); color: var(--text); cursor: pointer;
      font-family: var(--sans); font-size: 13px; font-weight: 600; transition: all .15s;
    }
    .btn:hover { border-color: var(--accent); background: rgba(255,79,216,.08); }
    .btn--accent { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn--accent:hover { background: #e040c0; }
    .btn--good { background: rgba(57,217,138,.15); border-color: var(--good); color: var(--good); }
    .btn--danger { background: rgba(255,89,100,.1); border-color: var(--danger); color: var(--danger); }
    .btn--small { padding: 5px 10px; font-size: 12px; }

    .toolbar {
      padding: 12px 20px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
      border-bottom: 1px solid var(--border); background: var(--panel);
    }
    .toolbar__search {
      flex: 1; min-width: 200px; padding: 8px 12px; border-radius: 8px;
      border: 1px solid var(--border2); background: var(--surface);
      color: var(--text); font-size: 14px; font-family: var(--sans);
    }
    .toolbar__search:focus { outline: none; border-color: var(--accent); }
    .toolbar__filter {
      padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); font-size: 12px; cursor: pointer;
      font-family: var(--sans); font-weight: 600;
    }
    .toolbar__filter:hover { color: var(--text); border-color: var(--border2); }
    .toolbar__filter--active { color: var(--accent); border-color: var(--accent); background: rgba(255,79,216,.06); }

    .batchbar {
      display: none; padding: 10px 20px; gap: 10px; align-items: center;
      background: var(--panel2); border-bottom: 1px solid var(--border);
    }
    .batchbar.active { display: flex; flex-wrap: wrap; }
    .batchbar__count { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--accent); margin-right: 8px; }
    .batchbar select, .batchbar input {
      padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border2);
      background: var(--surface); color: var(--text); font-size: 13px; font-family: var(--sans);
    }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 2px; padding: 2px; }

    .card {
      background: var(--panel); border: 1px solid transparent;
      cursor: pointer; position: relative; transition: border-color .15s;
    }
    .card:hover { border-color: var(--border2); }
    .card.selected { border-color: var(--accent); background: rgba(255,79,216,.04); }
    .card__check {
      position: absolute; top: 8px; left: 8px; z-index: 2;
      width: 20px; height: 20px; border-radius: 4px;
      border: 2px solid rgba(255,255,255,.3); background: rgba(0,0,0,.4);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: transparent; transition: all .1s;
    }
    .card.selected .card__check { border-color: var(--accent); background: var(--accent); color: #fff; }
    .card__img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
    .card__body { padding: 10px; }
    .card__title { font-weight: 700; font-size: 13px; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card__meta { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; font-size: 11px; color: var(--muted); }
    .card__badge { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; padding: 2px 6px; border-radius: 4px; }
    .badge--metal { background: rgba(255,79,216,.12); color: var(--accent); }
    .badge--photo { background: rgba(69,215,255,.12); color: var(--accent2); }
    .badge--print { background: rgba(57,217,138,.12); color: var(--good); }
    .card__edited { position: absolute; top: 8px; right: 8px; width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }

    .editpanel {
      position: fixed; top: 0; right: 0; bottom: 0; width: min(500px, 90vw);
      background: var(--panel); border-left: 1px solid var(--border);
      z-index: 100; transform: translateX(100%); transition: transform .25s ease;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .editpanel.open { transform: translateX(0); }
    .editpanel__backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 99; display: none; }
    .editpanel__backdrop.open { display: block; }
    .editpanel__header {
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .editpanel__title { font-weight: 900; font-size: 16px; }
    .editpanel__close { background: none; border: none; color: var(--muted); font-size: 24px; cursor: pointer; padding: 4px 8px; }
    .editpanel__close:hover { color: var(--text); }
    .editpanel__body { flex: 1; overflow-y: auto; padding: 20px; }
    .editpanel__preview { width: 100%; max-height: 280px; object-fit: contain; border-radius: 8px; margin-bottom: 16px; background: #000; }

    .field { margin-bottom: 16px; }
    .field__label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 4px; }
    .field__input, .field__select, .field__textarea {
      width: 100%; padding: 8px 12px; border-radius: 8px;
      border: 1px solid var(--border2); background: var(--surface);
      color: var(--text); font-size: 14px; font-family: var(--sans);
    }
    .field__input:focus, .field__select:focus, .field__textarea:focus { outline: none; border-color: var(--accent); }
    .field__textarea { min-height: 60px; resize: vertical; }
    .field__sku { font-family: var(--mono); font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    .editpanel__footer { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }

    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: var(--good); color: #000; padding: 10px 20px; border-radius: 8px;
      font-weight: 700; font-size: 14px; z-index: 200; opacity: 0; transition: opacity .3s;
    }
    .toast.show { opacity: 1; }
    .empty { text-align: center; padding: 80px 20px; color: var(--muted); }
    .empty__title { font-size: 18px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar__title">arttra admin</div>
  <div class="topbar__actions">
    <span class="topbar__stat" id="statTotal">—</span>
    <button class="btn btn--good" id="btnExport">Export overrides.json</button>
    <button class="btn" id="btnImport">Import overrides</button>
    <input type="file" id="importFile" accept=".json" style="display:none">
  </div>
</div>

<div class="toolbar">
  <input class="toolbar__search" id="search" type="search" placeholder="Search titles, SKUs, styles..." />
  <button class="toolbar__filter toolbar__filter--active" data-filter="all">All</button>
  <button class="toolbar__filter" data-filter="Metal Art">Metal</button>
  <button class="toolbar__filter" data-filter="Art Prints">Prints</button>
  <button class="toolbar__filter" data-filter="Photography">Photo</button>
  <button class="toolbar__filter" data-filter="unpriced">Unpriced</button>
  <button class="toolbar__filter" data-filter="edited">Edited</button>
</div>

<div class="batchbar" id="batchbar">
  <span class="batchbar__count" id="batchCount">0</span>
  <select id="batchCategory"><option value="">Category...</option><option>Metal Art</option><option>Art Prints</option><option>Photography</option></select>
  <select id="batchStyle"><option value="">Style...</option><option>Ironwork</option><option>Chromata</option><option>Starkform</option><option>Naturalis</option><option>Luminos</option><option>Tenebrae</option><option>Intricata</option><option>Photography</option></select>
  <input id="batchPrice" type="number" placeholder="Price" style="width:80px" />
  <input id="batchMaterials" type="text" placeholder="Materials" style="width:150px" />
  <button class="btn btn--accent btn--small" id="batchApply">Apply</button>
  <button class="btn btn--small" id="batchDeselect">Clear</button>
  <button class="btn btn--danger btn--small" id="batchRemoveBg">Flag bg removal</button>
  <button class="btn btn--danger btn--small" id="batchHide">Hide</button>
</div>

<div id="grid" class="grid"></div>

<div class="editpanel__backdrop" id="backdrop"></div>
<div class="editpanel" id="editpanel">
  <div class="editpanel__header">
    <div class="editpanel__title">Edit</div>
    <button class="editpanel__close" id="editClose">×</button>
  </div>
  <div class="editpanel__body">
    <img class="editpanel__preview" id="editImage" />
    <div class="field__sku" id="editSku"></div>
    <div class="field"><div class="field__label">Title</div><input class="field__input" id="editName" /></div>
    <div class="field"><div class="field__label">Category</div>
      <select class="field__select" id="editCategory"><option>Metal Art</option><option>Art Prints</option><option>Photography</option></select>
    </div>
    <div class="field"><div class="field__label">Style</div>
      <select class="field__select" id="editStyle"><option>Ironwork</option><option>Chromata</option><option>Starkform</option><option>Naturalis</option><option>Luminos</option><option>Tenebrae</option><option>Intricata</option><option>Photography</option></select>
    </div>
    <div class="field"><div class="field__label">Price ($)</div><input class="field__input" id="editPrice" type="number" step="1" /></div>
    <div class="field"><div class="field__label">Materials</div><input class="field__input" id="editMaterials" placeholder="acrylic, ink, canvas" /></div>
    <div class="field"><div class="field__label">Available products</div><input class="field__input" id="editProducts" placeholder="Laser-Cut Metal, Canvas, Framed Print" /></div>
    <div class="field"><div class="field__label">Description</div><textarea class="field__textarea" id="editDesc"></textarea></div>
    <div class="field"><label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="editRemoveBg" /><span class="field__label" style="margin:0">Flag for background removal</span></label></div>
    <div class="field"><label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="editHidden" /><span class="field__label" style="margin:0">Hide from gallery</span></label></div>
    <div class="field"><button class="btn btn--danger btn--small" id="editReset">Reset to auto-generated</button></div>
  </div>
  <div class="editpanel__footer">
    <button class="btn" id="editPrev">← Prev</button>
    <button class="btn" id="editNext">Next →</button>
    <button class="btn btn--accent" id="editSave">Save</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let artworks = [], overrides = {}, selected = new Set();
let filterCategory = "all", searchQuery = "", editingId = null;

async function loadData() {
  try { artworks = await (await fetch("./data/artworks.json", {cache:"no-store"})).json(); } catch { artworks = []; }
  try { const s = localStorage.getItem("arttra_overrides"); if (s) overrides = JSON.parse(s); } catch {}
  updateStats(); renderGrid();
}
function save() { localStorage.setItem("arttra_overrides", JSON.stringify(overrides)); }
function eff(art) { return {...art, ...(overrides[art.id]||{})}; }
function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function updateStats() {
  const oc = Object.keys(overrides).length;
  document.getElementById("statTotal").textContent = `${artworks.length} pieces` + (oc ? ` · ${oc} edits` : "");
}

function getFiltered() {
  return artworks.filter(art => {
    const e = eff(art);
    if (filterCategory === "edited") return !!overrides[art.id];
    if (filterCategory === "unpriced") return (e.priceTiers?.startingPrice ?? 79) === 79;
    if (filterCategory !== "all" && e.category !== filterCategory) return false;
    if (searchQuery) {
      const h = [e.title, e.sku, e.style, e.category, e.materials||""].join(" ").toLowerCase();
      if (!h.includes(searchQuery.toLowerCase())) return false;
    }
    return true;
  });
}

function renderGrid() {
  const grid = document.getElementById("grid");
  const filtered = getFiltered();
  if (!filtered.length) { grid.innerHTML = '<div class="empty"><div class="empty__title">No artworks</div></div>'; return; }

  grid.innerHTML = filtered.map(art => {
    const e = eff(art), sel = selected.has(art.id), edited = !!overrides[art.id];
    const cc = e.category==="Metal Art" ? "badge--metal" : e.category==="Photography" ? "badge--photo" : "badge--print";
    return `<div class="card ${sel?"selected":""}" data-id="${art.id}">
      <div class="card__check">${sel?"✓":""}</div>
      ${edited?'<div class="card__edited"></div>':""}
      <img class="card__img" src="${e.thumb||e.image||""}" loading="lazy" alt="" />
      <div class="card__body">
        <div class="card__title" title="${esc(e.title)}">${esc(e.title)}</div>
        <div class="card__meta">
          <span class="card__badge ${cc}">${esc(e.category||"?")}</span>
          <span>${e.priceTiers?.startingPrice?"$"+e.priceTiers.startingPrice:""}</span>
        </div>
      </div>
    </div>`;
  }).join("");

  grid.querySelectorAll(".card").forEach(c => {
    const id = c.dataset.id;
    c.querySelector(".card__check").addEventListener("click", e => { e.stopPropagation(); toggleSelect(id); });
    c.addEventListener("click", () => openEdit(id));
  });
}

function toggleSelect(id) { selected.has(id) ? selected.delete(id) : selected.add(id); updateBatch(); renderGrid(); }
function updateBatch() {
  const b = document.getElementById("batchbar");
  b.classList.toggle("active", selected.size > 0);
  document.getElementById("batchCount").textContent = selected.size + " selected";
}

// Batch
document.getElementById("batchApply").addEventListener("click", () => {
  const cat=document.getElementById("batchCategory").value, sty=document.getElementById("batchStyle").value;
  const pr=document.getElementById("batchPrice").value, mat=document.getElementById("batchMaterials").value;
  for (const id of selected) {
    if (!overrides[id]) overrides[id] = {};
    if (cat) overrides[id].category = cat;
    if (sty) overrides[id].style = sty;
    if (pr) overrides[id].priceTiers = {startingPrice: Number(pr)};
    if (mat) overrides[id].materials = mat;
  }
  save(); updateStats(); renderGrid(); toast(`Updated ${selected.size}`);
});
document.getElementById("batchDeselect").addEventListener("click", () => { selected.clear(); updateBatch(); renderGrid(); });
document.getElementById("batchRemoveBg").addEventListener("click", () => {
  for (const id of selected) { if (!overrides[id]) overrides[id]={}; overrides[id].removeBg=true; }
  save(); toast(`Flagged ${selected.size} for bg removal`);
});
document.getElementById("batchHide").addEventListener("click", () => {
  for (const id of selected) { if (!overrides[id]) overrides[id]={}; overrides[id].hidden=true; }
  save(); updateStats(); renderGrid(); toast(`Hidden ${selected.size}`);
});

// Edit panel
function openEdit(id) {
  editingId = id;
  const art = artworks.find(a=>a.id===id); if (!art) return;
  const e = eff(art);
  document.getElementById("editImage").src = e.image||e.thumb||"";
  document.getElementById("editSku").textContent = e.sku||"";
  document.getElementById("editName").value = e.title||"";
  document.getElementById("editCategory").value = e.category||"Art Prints";
  document.getElementById("editStyle").value = e.style||"Naturalis";
  document.getElementById("editPrice").value = e.priceTiers?.startingPrice||"";
  document.getElementById("editMaterials").value = e.materials||"";
  document.getElementById("editProducts").value = (e.bestProducts||[]).join(", ");
  document.getElementById("editDesc").value = e.description||"";
  document.getElementById("editRemoveBg").checked = e.removeBg||false;
  document.getElementById("editHidden").checked = e.hidden||false;
  document.getElementById("editpanel").classList.add("open");
  document.getElementById("backdrop").classList.add("open");
}
function closeEdit() {
  document.getElementById("editpanel").classList.remove("open");
  document.getElementById("backdrop").classList.remove("open");
  editingId = null;
}
document.getElementById("editClose").addEventListener("click", closeEdit);
document.getElementById("backdrop").addEventListener("click", closeEdit);

document.getElementById("editSave").addEventListener("click", () => {
  if (!editingId) return;
  if (!overrides[editingId]) overrides[editingId] = {};
  const o = overrides[editingId];
  o.title = document.getElementById("editName").value;
  o.category = document.getElementById("editCategory").value;
  o.style = document.getElementById("editStyle").value;
  o.description = document.getElementById("editDesc").value;
  o.materials = document.getElementById("editMaterials").value;
  o.removeBg = document.getElementById("editRemoveBg").checked;
  o.hidden = document.getElementById("editHidden").checked;
  const p = document.getElementById("editPrice").value;
  if (p) o.priceTiers = {startingPrice: Number(p)};
  const pr = document.getElementById("editProducts").value;
  if (pr) o.bestProducts = pr.split(",").map(s=>s.trim()).filter(Boolean);
  save(); updateStats(); renderGrid(); closeEdit(); toast("Saved");
});

document.getElementById("editReset").addEventListener("click", () => {
  if (!editingId) return;
  delete overrides[editingId];
  save(); updateStats(); openEdit(editingId); toast("Reset to auto");
});

// Prev/Next navigation
document.getElementById("editPrev").addEventListener("click", () => {
  if (!editingId) return;
  const f = getFiltered(), idx = f.findIndex(a=>a.id===editingId);
  if (idx > 0) { saveCurrentEdit(); openEdit(f[idx-1].id); }
});
document.getElementById("editNext").addEventListener("click", () => {
  if (!editingId) return;
  const f = getFiltered(), idx = f.findIndex(a=>a.id===editingId);
  if (idx < f.length-1) { saveCurrentEdit(); openEdit(f[idx+1].id); }
});
function saveCurrentEdit() { document.getElementById("editSave").click(); }

// Filters
document.querySelectorAll(".toolbar__filter").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".toolbar__filter").forEach(b=>b.classList.remove("toolbar__filter--active"));
    btn.classList.add("toolbar__filter--active");
    filterCategory = btn.dataset.filter;
    renderGrid();
  });
});
document.getElementById("search").addEventListener("input", e => { searchQuery = e.target.value; renderGrid(); });

// Export/Import
document.getElementById("btnExport").addEventListener("click", () => {
  const b = new Blob([JSON.stringify(overrides, null, 2)], {type:"application/json"});
  const a = document.createElement("a"); a.href = URL.createObjectURL(b); a.download = "overrides.json"; a.click();
  toast("Exported overrides.json — commit to repo");
});
document.getElementById("btnImport").addEventListener("click", () => document.getElementById("importFile").click());
document.getElementById("importFile").addEventListener("change", e => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = () => { try { overrides={...overrides,...JSON.parse(r.result)}; save(); updateStats(); renderGrid(); toast("Imported"); } catch { toast("Bad JSON"); } };
  r.readAsText(f); e.target.value="";
});

// Keyboard
window.addEventListener("keydown", e => {
  if (e.key==="Escape") closeEdit();
  if ((e.metaKey||e.ctrlKey) && e.key==="a") { e.preventDefault(); getFiltered().forEach(a=>selected.add(a.id)); updateBatch(); renderGrid(); }
});

function toast(m) { const t=document.getElementById("toast"); t.textContent=m; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),2000); }

loadData();
</script>
</body>
</html>

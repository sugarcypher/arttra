<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Residual Warmth — Generative Art</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }

        .container {
            display: flex;
            min-height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        .sidebar {
            width: 320px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20, 20, 19, 0.1);
            overflow-y: auto;
            overflow-x: hidden;
            max-height: calc(100vh - 40px);
        }

        .sidebar h1 {
            font-family: 'Lora', serif;
            font-size: 24px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .sidebar .subtitle {
            color: var(--anthropic-mid-gray);
            font-size: 13px;
            margin-bottom: 28px;
            line-height: 1.5;
            font-style: italic;
        }

        .control-section { margin-bottom: 28px; }

        .control-section h3 {
            font-size: 15px;
            font-weight: 600;
            color: var(--anthropic-dark);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-section h3::before {
            content: '•';
            color: var(--anthropic-orange);
            font-weight: bold;
        }

        .seed-input {
            width: 100%;
            background: var(--anthropic-light);
            padding: 12px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin-bottom: 12px;
            border: 1px solid var(--anthropic-light-gray);
            text-align: center;
        }

        .seed-input:focus {
            outline: none;
            border-color: var(--anthropic-orange);
            box-shadow: 0 0 0 2px rgba(217, 119, 87, 0.1);
            background: white;
        }

        .seed-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        .regen-button { margin-bottom: 0; }

        .control-group { margin-bottom: 18px; }

        .control-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .slider-container input[type="range"] {
            flex: 1;
            height: 4px;
            background: var(--anthropic-light-gray);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            background: #c86641;
        }

        .slider-container input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            border: none;
            cursor: pointer;
        }

        .value-display {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            min-width: 56px;
            text-align: right;
        }

        .color-group { margin-bottom: 14px; }

        .color-group label {
            display: block;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            margin-bottom: 4px;
        }

        .color-picker-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .color-picker-container input[type="color"] {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: none;
            padding: 0;
        }

        .color-value {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
        }

        .button {
            background: var(--anthropic-orange);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .button:hover { background: #c86641; transform: translateY(-1px); }
        .button:active { transform: translateY(0); }
        .button.secondary { background: var(--anthropic-blue); }
        .button.secondary:hover { background: #5a8bb8; }
        .button.tertiary { background: var(--anthropic-green); }
        .button.tertiary:hover { background: #6b7b52; }

        .button-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        .button-row:last-child { margin-bottom: 0; }
        .button-row .button { flex: 1; }

        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
        }

        #canvas-container {
            width: 100%;
            max-width: 1000px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(20, 20, 19, 0.12);
            background: #faf9f5;
            position: relative;
        }

        #canvas-container canvas {
            display: block;
            width: 100% !important;
            height: auto !important;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: var(--anthropic-mid-gray);
            padding: 80px 40px;
            font-style: italic;
        }

        .progress-indicator {
            position: absolute;
            bottom: 12px;
            right: 14px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: var(--anthropic-mid-gray);
            background: rgba(255, 255, 255, 0.7);
            padding: 3px 8px;
            border-radius: 4px;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .progress-indicator.visible { opacity: 1; }

        @media (max-width: 600px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; max-height: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>Residual Warmth</h1>
            <div class="subtitle">Layered streams, gently attending. Each pass accumulates onto the last — the image is the record of its own making.</div>

            <div class="control-section">
                <h3>Seed</h3>
                <input type="number" id="seed-input" class="seed-input" value="12345" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">← Prev</button>
                    <button class="button secondary" onclick="nextSeed()">Next →</button>
                </div>
                <button class="button tertiary regen-button" onclick="randomSeedAndUpdate()">↻ Random</button>
            </div>

            <div class="control-section">
                <h3>Parameters</h3>

                <div class="control-group">
                    <label>Stream Count</label>
                    <div class="slider-container">
                        <input type="range" id="streamCount" min="20" max="180" step="5" value="90" oninput="updateParam('streamCount', this.value)">
                        <span class="value-display" id="streamCount-value">90</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Pass Depth</label>
                    <div class="slider-container">
                        <input type="range" id="passDepth" min="1" max="20" step="1" value="8" oninput="updateParam('passDepth', this.value)">
                        <span class="value-display" id="passDepth-value">8</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Flow Scale</label>
                    <div class="slider-container">
                        <input type="range" id="flowScale" min="0.001" max="0.01" step="0.0005" value="0.003" oninput="updateParam('flowScale', this.value)">
                        <span class="value-display" id="flowScale-value">0.003</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Attention Strength</label>
                    <div class="slider-container">
                        <input type="range" id="attentionStrength" min="0" max="1" step="0.05" value="0.55" oninput="updateParam('attentionStrength', this.value)">
                        <span class="value-display" id="attentionStrength-value">0.55</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Attention Nodes</label>
                    <div class="slider-container">
                        <input type="range" id="attentionNodes" min="0" max="12" step="1" value="5" oninput="updateParam('attentionNodes', this.value)">
                        <span class="value-display" id="attentionNodes-value">5</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Stream Length</label>
                    <div class="slider-container">
                        <input type="range" id="streamLength" min="100" max="1400" step="50" value="650" oninput="updateParam('streamLength', this.value)">
                        <span class="value-display" id="streamLength-value">650</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Line Weight</label>
                    <div class="slider-container">
                        <input type="range" id="lineWeight" min="0.2" max="3" step="0.1" value="0.8" oninput="updateParam('lineWeight', this.value)">
                        <span class="value-display" id="lineWeight-value">0.8</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Colors</h3>

                <div class="color-group">
                    <label>Ember</label>
                    <div class="color-picker-container">
                        <input type="color" id="color1" value="#d97757" onchange="updateColor('color1', this.value)">
                        <span class="color-value" id="color1-value">#d97757</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>Dusk</label>
                    <div class="color-picker-container">
                        <input type="color" id="color2" value="#6a9bcc" onchange="updateColor('color2', this.value)">
                        <span class="color-value" id="color2-value">#6a9bcc</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>Olive</label>
                    <div class="color-picker-container">
                        <input type="color" id="color3" value="#788c5d" onchange="updateColor('color3', this.value)">
                        <span class="color-value" id="color3-value">#788c5d</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>Graphite</label>
                    <div class="color-picker-container">
                        <input type="color" id="color4" value="#3a2f28" onchange="updateColor('color4', this.value)">
                        <span class="color-value" id="color4-value">#3a2f28</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row">
                    <button class="button" onclick="regenerate()">Regenerate</button>
                    <button class="button" onclick="resetParameters()">Reset</button>
                </div>
                <div class="button-row">
                    <button class="button secondary" onclick="downloadImage()">Download PNG</button>
                </div>
            </div>
        </div>

        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">Initializing generative art…</div>
                <div class="progress-indicator" id="progress-indicator">0%</div>
            </div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════════════════
        // RESIDUAL WARMTH — PARAMETERS
        // ═══════════════════════════════════════════════════════════════════════

        let params = {
            seed: 12345,
            streamCount: 90,
            passDepth: 8,
            flowScale: 0.003,
            attentionStrength: 0.55,
            attentionNodes: 5,
            streamLength: 650,
            lineWeight: 0.8,
            palette: ['#d97757', '#6a9bcc', '#788c5d', '#3a2f28']
        };

        let defaultParams = JSON.parse(JSON.stringify(params));

        // ═══════════════════════════════════════════════════════════════════════
        // SYSTEM STATE
        // ═══════════════════════════════════════════════════════════════════════

        let attentionNodes = [];
        let streams = [];
        let rng;

        // Incremental render state — each frame lays down a few more passes,
        // so the accumulation is visible. This IS the aesthetic.
        let render = {
            streamIndex: 0,
            passIndex: 0,
            complete: false,
            totalWork: 0,
            doneWork: 0
        };

        // Deterministic hash-based PRNG so seed is honored even for layout.
        function mulberry32(a) {
            return function() {
                a |= 0; a = a + 0x6D2B79F5 | 0;
                let t = a;
                t = Math.imul(t ^ t >>> 15, t | 1);
                t ^= t + Math.imul(t ^ t >>> 7, t | 61);
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            };
        }

        function rnd() { return rng(); }
        function rndRange(a, b) { return a + rng() * (b - a); }
        function rndPick(arr) { return arr[Math.floor(rng() * arr.length)]; }

        // ═══════════════════════════════════════════════════════════════════════
        // P5 LIFECYCLE
        // ═══════════════════════════════════════════════════════════════════════

        function setup() {
            let canvas = createCanvas(1200, 1200);
            canvas.parent('canvas-container');
            pixelDensity(1);
            const loading = document.querySelector('.loading');
            if (loading) loading.style.display = 'none';
            initializeSystem();
        }

        function initializeSystem() {
            rng = mulberry32(params.seed);
            randomSeed(params.seed);
            noiseSeed(params.seed);

            // Paper background
            colorMode(RGB, 255);
            background(250, 249, 245);
            drawPaperTexture();

            // Attention nodes — hidden gravitational loci
            attentionNodes = [];
            for (let i = 0; i < params.attentionNodes; i++) {
                attentionNodes.push({
                    x: rndRange(width * 0.12, width * 0.88),
                    y: rndRange(height * 0.12, height * 0.88),
                    radius: rndRange(160, 380),
                    rotation: rndRange(0, TWO_PI),
                    swirl: rndRange(-0.6, 0.6)
                });
            }

            // Streams — each with a seed point, speed, and chromatic temperature
            streams = [];
            const palette = buildPalette();
            for (let i = 0; i < params.streamCount; i++) {
                const edge = Math.floor(rng() * 4);
                let sx, sy;
                // 60% interior starts, 40% edge starts — varied compositional entry
                if (rng() < 0.6) {
                    sx = rndRange(width * 0.08, width * 0.92);
                    sy = rndRange(height * 0.08, height * 0.92);
                } else {
                    if (edge === 0) { sx = rndRange(-50, width + 50); sy = -30; }
                    else if (edge === 1) { sx = width + 30; sy = rndRange(-50, height + 50); }
                    else if (edge === 2) { sx = rndRange(-50, width + 50); sy = height + 30; }
                    else { sx = -30; sy = rndRange(-50, height + 50); }
                }
                streams.push({
                    startX: sx,
                    startY: sy,
                    color: rndPick(palette),
                    speed: rndRange(0.75, 1.45),
                    hueJitter: rndRange(-6, 6),
                    satJitter: rndRange(-8, 4),
                    briJitter: rndRange(-4, 4),
                    phase: rndRange(0, 1000)
                });
            }

            // Reset render state
            render.streamIndex = 0;
            render.passIndex = 0;
            render.complete = false;
            render.totalWork = streams.length * params.passDepth;
            render.doneWork = 0;

            const prog = document.getElementById('progress-indicator');
            prog.classList.add('visible');
            prog.textContent = '0%';

            loop();
        }

        function buildPalette() {
            // Normalize every palette entry into the Residual Warmth luminance band.
            // This is the load-bearing constraint: without it, additive crossings in
            // sRGB muddy. With it, "deepens rather than muddies" is a math consequence.
            const hsb = params.palette.map(normalizePaletteColor);
            // Weight ember slightly heavier — warm-leaning composition
            return [hsb[0], hsb[0], hsb[1], hsb[2], hsb[3]];
        }

        // Palette constraint (see spec §Palette):
        //   L_band = [0.22, 0.60]   Rec. 709 relative luminance
        //   s_cap  = 0.72           HSB saturation ceiling
        // Hue is preserved. Brightness is rescaled if the color falls outside the
        // band. Saturation is clamped. Reproduces the "bounded luminance band"
        // invariant that makes the system tolerant of arbitrary user picks.
        function normalizePaletteColor(hex) {
            const r = parseInt(hex.slice(1,3), 16) / 255;
            const g = parseInt(hex.slice(3,5), 16) / 255;
            const b = parseInt(hex.slice(5,7), 16) / 255;
            const L = 0.2126 * r + 0.7152 * g + 0.0722 * b;

            const hsb = hexToHSB(hex);
            const L_min = 0.22, L_max = 0.60;
            if (L < L_min && L > 0.001) {
                hsb.b = Math.min(100, hsb.b * (L_min / L));
            } else if (L > L_max) {
                hsb.b = hsb.b * (L_max / L);
            } else if (L <= 0.001) {
                // Near-black: lift into lower band directly
                hsb.b = L_min * 100;
            }
            hsb.s = Math.min(72, hsb.s);
            return hsb;
        }

        function hexToHSB(hex) {
            let r = parseInt(hex.slice(1,3), 16) / 255;
            let g = parseInt(hex.slice(3,5), 16) / 255;
            let b = parseInt(hex.slice(5,7), 16) / 255;
            let mx = Math.max(r,g,b), mn = Math.min(r,g,b);
            let d = mx - mn;
            let h = 0;
            if (d !== 0) {
                if (mx === r) h = ((g - b) / d) % 6;
                else if (mx === g) h = (b - r) / d + 2;
                else h = (r - g) / d + 4;
                h *= 60;
                if (h < 0) h += 360;
            }
            const s = mx === 0 ? 0 : (d / mx) * 100;
            const v = mx * 100;
            return { h: h, s: s, b: v };
        }

        // ═══════════════════════════════════════════════════════════════════════
        // PAPER TEXTURE — subtle speckle so accumulated strokes sit on a ground
        // ═══════════════════════════════════════════════════════════════════════

        function drawPaperTexture() {
            push();
            noStroke();
            for (let i = 0; i < 2800; i++) {
                const x = rndRange(0, width);
                const y = rndRange(0, height);
                const a = rndRange(2, 7);
                fill(60, 45, 30, a);
                circle(x, y, rndRange(0.5, 1.6));
            }
            // A whisper of warm vignette
            for (let i = 0; i < 60; i++) {
                const r = 1200 - i * 18;
                noFill();
                stroke(90, 65, 40, 0.6);
                strokeWeight(1);
                ellipse(width/2, height/2, r*1.4, r*1.4);
            }
            pop();
        }

        // ═══════════════════════════════════════════════════════════════════════
        // RENDER — incremental; each frame draws a handful of passes so the
        // layered accumulation is visible. When done, stops the loop.
        // ═══════════════════════════════════════════════════════════════════════

        function draw() {
            if (render.complete) return;

            // Adaptive budget: more passes per frame for lighter configs.
            const segmentBudget = 14000;
            let segmentsThisFrame = 0;

            colorMode(HSB, 360, 100, 100, 1);

            while (segmentsThisFrame < segmentBudget && !render.complete) {
                const s = streams[render.streamIndex];
                const segments = renderPass(s, render.passIndex);
                segmentsThisFrame += segments;
                render.doneWork++;

                render.passIndex++;
                if (render.passIndex >= params.passDepth) {
                    render.passIndex = 0;
                    render.streamIndex++;
                    if (render.streamIndex >= streams.length) {
                        render.complete = true;
                        colorMode(RGB, 255);
                        finishRender();
                        return;
                    }
                }
            }

            colorMode(RGB, 255);
            updateProgress();
        }

        function renderPass(stream, passIndex) {
            const passProgress = passIndex / Math.max(1, params.passDepth - 1);
            // Pass-local perturbation so each residual layer is displaced slightly.
            const dx = (pseudoRand(stream.phase + passIndex * 17.3) - 0.5) * 6;
            const dy = (pseudoRand(stream.phase + passIndex * 29.1) - 0.5) * 6;
            let x = stream.startX + dx;
            let y = stream.startY + dy;

            // Residual alpha grows subtly with deeper passes — later layers bind
            // earlier ones together rather than dominating them.
            const passAlpha = 0.035 + passProgress * 0.025;
            const h = (stream.color.h + stream.hueJitter + passIndex * 0.7 + 360) % 360;
            const s = constrain(stream.color.s + stream.satJitter - passProgress * 4, 0, 100);
            const b = constrain(stream.color.b + stream.briJitter - passProgress * 2, 0, 100);
            const weight = params.lineWeight * (0.55 + passProgress * 0.9);

            stroke(h, s, b, passAlpha);
            strokeWeight(weight);
            noFill();

            let segments = 0;
            const maxSteps = params.streamLength;
            const flowScale = params.flowScale;
            const noiseZ = passIndex * 0.08 + stream.phase * 0.001;

            for (let step = 0; step < maxSteps; step++) {
                // Base flow angle from layered Perlin noise
                let angle = noise(x * flowScale, y * flowScale, noiseZ) * TWO_PI * 2;

                // Attention — Vector Warping (Model B per spec).
                // Deterministic local steering toward node with swirl to prevent
                // pure radial convergence. Quadratic falloff. NOT a potential
                // field; NOT probabilistic.
                if (params.attentionStrength > 0 && attentionNodes.length) {
                    let cA = Math.cos(angle);
                    let sA = Math.sin(angle);
                    for (let k = 0; k < attentionNodes.length; k++) {
                        const node = attentionNodes[k];
                        const ndx = node.x - x;
                        const ndy = node.y - y;
                        const d = Math.sqrt(ndx*ndx + ndy*ndy);
                        if (d < node.radius && d > 0.01) {
                            const fall = 1 - d / node.radius;
                            const infl = fall * fall * params.attentionStrength;
                            const tangent = Math.atan2(ndy, ndx) + node.swirl * fall;
                            cA = cA * (1 - infl) + Math.cos(tangent) * infl;
                            sA = sA * (1 - infl) + Math.sin(tangent) * infl;
                        }
                    }
                    angle = Math.atan2(sA, cA);
                }

                const nx = x + Math.cos(angle) * stream.speed;
                const ny = y + Math.sin(angle) * stream.speed;

                // Skip off-canvas segments but continue stepping briefly in case
                // the stream re-enters — mostly just break out.
                if (nx < -80 || nx > width + 80 || ny < -80 || ny > height + 80) {
                    x = nx; y = ny;
                    break;
                }

                line(x, y, nx, ny);
                segments++;
                x = nx; y = ny;
            }
            return segments;
        }

        function pseudoRand(v) {
            const x = Math.sin(v * 12.9898) * 43758.5453;
            return x - Math.floor(x);
        }

        function updateProgress() {
            const pct = Math.floor(100 * render.doneWork / Math.max(1, render.totalWork));
            const el = document.getElementById('progress-indicator');
            if (el) el.textContent = pct + '%';
        }

        function finishRender() {
            updateProgress();
            // Gentle final pass: add the barest dusting of warm noise to unify
            // color accumulation — the last breath across the paper.
            push();
            noStroke();
            for (let i = 0; i < 1500; i++) {
                const x = rndRange(0, width);
                const y = rndRange(0, height);
                fill(40, 30, 20, rndRange(1, 3));
                circle(x, y, rndRange(0.4, 1.1));
            }
            pop();
            noLoop();
            setTimeout(() => {
                const el = document.getElementById('progress-indicator');
                if (el) el.classList.remove('visible');
            }, 800);
        }

        // ═══════════════════════════════════════════════════════════════════════
        // UI HANDLERS
        // ═══════════════════════════════════════════════════════════════════════

        function updateParam(name, value) {
            const numeric = ['streamCount','passDepth','attentionNodes','streamLength'];
            params[name] = numeric.includes(name) ? parseInt(value) : parseFloat(value);
            document.getElementById(name + '-value').textContent = value;
            initializeSystem();
        }

        function updateColor(id, value) {
            const index = parseInt(id.replace('color','')) - 1;
            params.palette[index] = value;
            document.getElementById(id + '-value').textContent = value;
            initializeSystem();
        }

        function regenerate() { initializeSystem(); }

        function downloadImage() {
            if (!render.complete) return;
            saveCanvas('residual-warmth-seed-' + params.seed, 'png');
        }

        // ═══════════════════════════════════════════════════════════════════════
        // SEED CONTROLS
        // ═══════════════════════════════════════════════════════════════════════

        function updateSeedDisplay() {
            document.getElementById('seed-input').value = params.seed;
        }

        function updateSeed() {
            const input = document.getElementById('seed-input');
            const n = parseInt(input.value);
            if (n && n > 0) {
                params.seed = n;
                initializeSystem();
            } else {
                updateSeedDisplay();
            }
        }

        function previousSeed() {
            params.seed = Math.max(1, params.seed - 1);
            updateSeedDisplay();
            initializeSystem();
        }

        function nextSeed() {
            params.seed = params.seed + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function randomSeedAndUpdate() {
            params.seed = Math.floor(Math.random() * 999999) + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function resetParameters() {
            params = JSON.parse(JSON.stringify(defaultParams));

            const fields = ['streamCount','passDepth','flowScale','attentionStrength','attentionNodes','streamLength','lineWeight'];
            for (const f of fields) {
                document.getElementById(f).value = params[f];
                document.getElementById(f + '-value').textContent = params[f];
            }
            for (let i = 0; i < params.palette.length; i++) {
                document.getElementById('color' + (i+1)).value = params.palette[i];
                document.getElementById('color' + (i+1) + '-value').textContent = params.palette[i];
            }

            updateSeedDisplay();
            initializeSystem();
        }

        window.addEventListener('load', updateSeedDisplay);
    </script>
</body>
</html>

name: Build arttra.art

on:
  push:
    paths:
      - 'gallery-source/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install Pillow vtracer

      - name: Run pipeline
        working-directory: arttra
        run: python3 build_from_folder.py --source ../gallery-source --output ..

      - name: Commit and push
        run: |
          git config user.name "arttra-bot"
          git config user.email "bot@arttra.art"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main
            git push
          fi

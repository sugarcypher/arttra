name: Build arttra.art

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install instaloader Pillow
          pip install -r arttra/requirements.txt 2>/dev/null || true

      - name: Run pipeline
        working-directory: arttra
        run: |
          python arttra.py build --lookback 50

      - name: Copy site outputs to repo root
        run: |
          cp -f arttra/site/data/artworks.json data/artworks.json 2>/dev/null || true
          cp -f arttra/site/data/videos.json data/videos.json 2>/dev/null || true
          mkdir -p assets/images/gallery
          cp -rf arttra/site/assets/images/gallery/* assets/images/gallery/ 2>/dev/null || true
          mkdir -p assets/videos
          cp -rf arttra/site/assets/videos/* assets/videos/ 2>/dev/null || true

      - name: Commit and push
        run: |
          git config user.name "arttra-bot"
          git config user.email "bot@arttra.art"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
